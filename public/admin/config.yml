backend:
  name: git-gateway
  branch: main

media_folder: public/uploads
public_folder: /uploads

i18n:
  structure: single_file
  locales: [en, el]
  default_locale: en

collections:
  - name: content
    label: Site Content
    i18n: true
    files:

      - name: hero
        label: Hero Section
        i18n: true
        file: content/hero.json
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Subtitle, name: subtitle, widget: text, i18n: true }
          - { label: Primary Button Text, name: primaryCta, widget: string, i18n: true }
          - { label: Secondary Button Text, name: secondaryCta, widget: string, i18n: true }
          - { label: Hero Image, name: imageSrc, widget: image, required: false, i18n: duplicate }
          - { label: Image Alt Text, name: imageAlt, widget: string, i18n: true }
          - { label: Video Background URL, name: videoSrc, widget: file, required: false, i18n: duplicate, hint: "Optional: URL to a looping background video (.mp4 recommended)" }
          - label: "Layout"
            name: "layout"
            widget: "select"
            default: "image-right"
            i18n: duplicate
            options:
              - { label: "Default (Image Right)", value: "image-right" }
              - { label: "Cinematic (Full-bleed, 100vh)", value: "cinematic" }
              - { label: "Video Background", value: "video-background" }

      - name: about
        label: About Section
        i18n: true
        file: content/about.json
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Subtitle, name: subtitle, widget: string, i18n: true }
          - { label: Main Body Text, name: body, widget: text, i18n: true }
          - { label: Secondary Body Text, name: secondaryBody, widget: text, i18n: true }
          - { label: About Image, name: imageSrc, widget: image, required: false, i18n: duplicate }
          - { label: Image Alt Text, name: imageAlt, widget: string, i18n: true }
          - label: "Layout"
            name: "layout"
            widget: "select"
            default: "default"
            i18n: duplicate
            options:
              - { label: "Default", value: "default" }
              - { label: "Editorial (Large pull-quote title, two-column)", value: "editorial" }
          - label: Stats
            name: stats
            widget: list
            i18n: true
            fields:
              - { label: Number, name: number, widget: string }
              - { label: Label, name: label, widget: string }

      - name: services
        label: Services Section
        i18n: true
        file: content/services.json
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Subtitle, name: subtitle, widget: string, i18n: true }
          - { label: Description, name: description, widget: text, i18n: true }
          - label: Services
            name: items
            widget: list
            i18n: true
            fields:
              - { label: Icon Name, name: icon, widget: string, hint: "Lucide icon name e.g. Briefcase Star Heart" }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }

      - name: testimonials
        label: Testimonials Section
        i18n: true
        file: content/testimonials.json
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Subtitle, name: subtitle, widget: string, i18n: true }
          - { label: Description, name: description, widget: text, i18n: true }
          - label: Testimonials
            name: items
            widget: list
            i18n: true
            fields:
              - { label: Quote, name: quote, widget: text }
              - { label: Author Name, name: author, widget: string }
              - { label: Author Role, name: role, widget: string }
              - { label: Rating, name: rating, widget: number, value_type: int, min: 1, max: 5, default: 5 }

      - name: faq
        label: FAQ Section
        i18n: true
        file: content/faq.json
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Subtitle, name: subtitle, widget: string, i18n: true }
          - { label: Description, name: description, widget: text, i18n: true }
          - label: FAQ Items
            name: items
            widget: list
            i18n: true
            fields:
              - { label: Question, name: question, widget: string }
              - { label: Answer, name: answer, widget: text }

      - name: contact
        label: Contact Section
        i18n: true
        file: content/contact.json
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Subtitle, name: subtitle, widget: string, i18n: true }
          - { label: Description, name: description, widget: text, i18n: true }
          - { label: Name Placeholder, name: namePlaceholder, widget: string, i18n: true }
          - { label: Email Placeholder, name: emailPlaceholder, widget: string, i18n: true }
          - { label: Message Placeholder, name: messagePlaceholder, widget: string, i18n: true }
          - { label: Send Button Text, name: sendButton, widget: string, i18n: true }
          - { label: Success Message, name: successMessage, widget: string, i18n: true }
          - { label: Error Message, name: errorMessage, widget: string, i18n: true }

      - name: footer
        label: Footer
        i18n: true
        file: content/footer.json
        fields:
          - { label: Copyright Text, name: rights, widget: string, i18n: true }

      - name: gallery
        label: Gallery Section
        i18n: true
        file: content/gallery.json
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Subtitle, name: subtitle, widget: string, i18n: true }
          - label: Gallery Items
            name: items
            widget: list
            i18n: true
            fields:
              - { label: Image, name: src, widget: image }
              - { label: Alt Text, name: alt, widget: string, i18n: true }
              - { label: Caption, name: caption, widget: string, required: false, i18n: true }
