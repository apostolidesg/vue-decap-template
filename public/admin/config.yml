backend:
  name: git-gateway
  branch: main

media_folder: public/uploads
public_folder: /uploads

i18n:
  structure: multiple_files
  locales: [en, el]
  default_locale: en

collections:
  - name: content
    label: Site Content
    i18n: true
    files:

      - name: hero
        label: Hero Section
        i18n: true
        file: content/en/hero.json
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Subtitle, name: subtitle, widget: text, i18n: true }
          - { label: Primary Button Text, name: primaryCta, widget: string, i18n: true }
          - { label: Secondary Button Text, name: secondaryCta, widget: string, i18n: true }
          - { label: Hero Image, name: imageSrc, widget: image, required: false, i18n: duplicate }
          - { label: Image Alt Text, name: imageAlt, widget: string, i18n: true }

      - name: about
        label: About Section
        i18n: true
        file: content/en/about.json
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Subtitle, name: subtitle, widget: string, i18n: true }
          - { label: Main Body Text, name: body, widget: text, i18n: true }
          - { label: Secondary Body Text, name: secondaryBody, widget: text, i18n: true }
          - { label: About Image, name: imageSrc, widget: image, required: false, i18n: duplicate }
          - { label: Image Alt Text, name: imageAlt, widget: string, i18n: true }
          - label: Stats
            name: stats
            widget: list
            i18n: true
            fields:
              - { label: Number, name: number, widget: string }
              - { label: Label, name: label, widget: string }

      - name: services
        label: Services Section
        i18n: true
        file: content/en/services.json
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Subtitle, name: subtitle, widget: string, i18n: true }
          - { label: Description, name: description, widget: text, i18n: true }
          - label: Services
            name: items
            widget: list
            i18n: true
            fields:
              - { label: Icon Name, name: icon, widget: string, hint: "Lucide icon name e.g. Briefcase Star Heart" }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }

      - name: testimonials
        label: Testimonials Section
        i18n: true
        file: content/en/testimonials.json
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Subtitle, name: subtitle, widget: string, i18n: true }
          - { label: Description, name: description, widget: text, i18n: true }
          - label: Testimonials
            name: items
            widget: list
            i18n: true
            fields:
              - { label: Quote, name: quote, widget: text }
              - { label: Author Name, name: author, widget: string }
              - { label: Author Role, name: role, widget: string }
              - { label: Rating, name: rating, widget: number, value_type: int, min: 1, max: 5, default: 5 }

      - name: faq
        label: FAQ Section
        i18n: true
        file: content/en/faq.json
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Subtitle, name: subtitle, widget: string, i18n: true }
          - { label: Description, name: description, widget: text, i18n: true }
          - label: FAQ Items
            name: items
            widget: list
            i18n: true
            fields:
              - { label: Question, name: question, widget: string }
              - { label: Answer, name: answer, widget: text }

      - name: contact
        label: Contact Section
        i18n: true
        file: content/en/contact.json
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Subtitle, name: subtitle, widget: string, i18n: true }
          - { label: Description, name: description, widget: text, i18n: true }
          - { label: Name Field Placeholder, name: namePlaceholder, widget: string, i18n: true }
          - { label: Email Field Placeholder, name: emailPlaceholder, widget: string, i18n: true }
          - { label: Message Field Placeholder, name: messagePlaceholder, widget: string, i18n: true }
          - { label: Send Button Text, name: sendButton, widget: string, i18n: true }
          - { label: Success Message, name: successMessage, widget: string, i18n: true }
          - { label: Error Message, name: errorMessage, widget: string, i18n: true }
